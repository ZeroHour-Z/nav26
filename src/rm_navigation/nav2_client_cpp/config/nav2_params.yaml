# ============ 行为树导航器配置 ============
bt_navigator:
  ros__parameters:
    use_sim_time: False  # 是否使用仿真时间
    global_frame: map  # 全局坐标系
    robot_base_frame: base_link  # 机器人底盘坐标系
    odom_topic: /odom  # 里程计话题，odin 模式由 launch 覆盖为 /odin1/odometry
    bt_loop_duration: 10  # 行为树循环周期(ms)
    default_server_timeout: 20  # 默认服务超时时间(s)
    enable_groot_monitoring: True  # 启用 Groot 可视化监控
    groot_zmq_publisher_port: 1666  # Groot 发布端口
    groot_zmq_server_port: 1667  # Groot 服务端口
    plugin_lib_names:
    # - find_safe_goal_bt_node
    - nav2_compute_path_to_pose_action_bt_node
    - nav2_follow_path_action_bt_node
    - nav2_clear_costmap_service_bt_node
    - nav2_wait_action_bt_node
    - nav2_is_stuck_condition_bt_node
    - nav2_rate_controller_bt_node
    - nav2_distance_controller_bt_node
    - nav2_pipeline_sequence_bt_node
    - nav2_recovery_node_bt_node
    - nav2_goal_checker_selector_bt_node
    - nav2_compute_path_through_poses_action_bt_node
    - nav2_back_up_action_bt_node
    - nav2_spin_action_bt_node
    - nav2_goal_reached_condition_bt_node
    - nav2_goal_updated_condition_bt_node
    - nav2_initial_pose_received_condition_bt_node
    - nav2_reinitialize_global_localization_service_bt_node
    - nav2_speed_controller_bt_node
    - nav2_truncate_path_action_bt_node
    - nav2_goal_updater_node_bt_node
    - nav2_round_robin_node_bt_node
    - nav2_transform_available_condition_bt_node
    - nav2_time_expired_condition_bt_node
    - nav2_distance_traveled_condition_bt_node
    - nav2_single_trigger_bt_node
    - nav2_is_battery_low_condition_bt_node
    - nav2_navigate_through_poses_action_bt_node
    - nav2_navigate_to_pose_action_bt_node
    - nav2_remove_passed_goals_action_bt_node
    - nav2_planner_selector_bt_node
    - nav2_controller_selector_bt_node

bt_navigator_rclcpp_node:
  ros__parameters:
    use_sim_time: False

# ============ 路径跟踪控制器配置 ============
controller_server:
  ros__parameters:
    use_sim_time: False
    controller_frequency: 30.0  # 控制器更新频率(Hz) - 提高到20Hz以应对快速旋转
    min_x_velocity_threshold: 0.001  # X方向最小速度阈值(m/s)
    min_y_velocity_threshold: 0.001  # Y方向最小速度阈值(m/s)
    min_theta_velocity_threshold: 0.001  # 角速度最小阈值(rad/s)
    failure_tolerance: 0.5  # 失败容忍度 - 增加以应对陀螺旋转
    progress_checker_plugin: "progress_checker"  # 进度检查插件
    goal_checker_plugins: ["general_goal_checker"]  # 目标检查插件
    controller_plugins: ["FollowPath"]  # 使用的控制器插件

    # === 进度检查器参数 ===
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.3  # 要求的移动半径(m) - 减小以适应陀螺
      movement_time_allowance: 15.0  # 允许的移动时间(s) - 增加时间容忍

    # === 目标检查器参数 ===
    general_goal_checker:
      stateful: True  # 保持状态
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.05  # XY平面位置容差(m) - 放宽以适应陀螺
      yaw_goal_tolerance: 0.5  # 航向角容差(rad) - 放宽角度要求

    # === MPPI 局部规划 / 速度控制器 ===
    FollowPath:
      plugin: "nav2_mppi_controller::MPPIController"
      time_steps: 56              # 预测 2.8s: 56 * 0.05，参考 COD_NAV
      model_dt: 0.05
      batch_size: 1800            # 过高采样会在等价轨迹间跳动；先保持稳定
      vx_std: 0.24
      vy_std: 0.16
      wz_std: 0.16
      vx_max: 0.7
      vx_min: -0.15
      vy_max: 0.4
      wz_max: 0.7
      ax_max: 2.0
      ax_min: -3.0
      ay_max: 2.0
      az_max: 4.0
      iteration_count: 1
      prune_distance: 2.0
      transform_tolerance: 0.2
      temperature: 0.30
      gamma: 0.015
      motion_model: "Omni"
      visualize: false
      reset_period: 0.1
      retry_attempt_limit: 1
      regenerate_noises: true
      TrajectoryVisualizer:
        trajectory_step: 5
        time_step: 3
      AckermannConstraints:
        min_turning_r: 0.35
      critics: ["ConstraintCritic", "CostCritic", "GoalCritic", "GoalAngleCritic", "PathAlignCritic", "PathFollowCritic", "PathAngleCritic", "PreferForwardCritic", "ObstaclesCritic"]
      ConstraintCritic:
        enabled: true
        cost_power: 1
        cost_weight: 6.0
      GoalCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 1.0
      GoalAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 2.0
        threshold_to_consider: 0.5
      PreferForwardCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.0
        threshold_to_consider: 0.5
      ObstaclesCritic:
        enabled: false
        cost_power: 1
        repulsion_weight: 1.5
        critical_weight: 10.0
        consider_footprint: false
        collision_cost: 10000.0
        collision_margin_distance: 0.1
        near_goal_distance: 0.5
        inflation_radius: 0.7
        cost_scaling_factor: 8.0
      CostCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.81
        critical_cost: 50.0
        consider_footprint: false
        collision_cost: 1000000.0
        near_goal_distance: 0.1
        trajectory_point_step: 2
      PathAlignCritic:
        enabled: true
        cost_power: 1
        cost_weight: 16.0
        max_path_occupancy_ratio: 0.5
        trajectory_point_step: 1
        threshold_to_consider: 1.2
        offset_from_furthest: 12
        use_path_orientations: false
      PathFollowCritic:
        enabled: true
        cost_power: 1
        cost_weight: 16.0
        offset_from_furthest: 3
        threshold_to_consider: 1.0
      PathAngleCritic:
        enabled: false
        cost_power: 1
        cost_weight: 2.0
        offset_from_furthest: 4
        threshold_to_consider: 0.2
        max_angle_to_furthest: 1.0
        mode: 0

controller_server_rclcpp_node:
  ros__parameters:
    use_sim_time: False

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 10.0
      publish_frequency: 5.0
      global_frame: odom
      # global_frame: camera_init
      robot_base_frame: base_link
      use_sim_time: False
      rolling_window: true
      width: 5
      height: 5
      resolution: 0.05
      robot_radius: 0.2
      # 动态障碍物只放在 local costmap 的 rolling window 中，避免写入 global costmap 后残留。
      plugins: ["voxel2d_layer", "inflation_layer", "hole_centerline_layer"]
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 8.0
        inflation_radius: 0.7
      hole_centerline_layer:
        plugin: "click_obstacles_layer::RegionKeepoutLayer"
        enabled: True
        polygon_frame: map
        polygon: [1.6, 1.0, 0.8, 1.0, 0.8, 3.0, 1.6, 3.0]
        centerline_width: 0.36
        keepout_cost: 254
      voxel2d_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: True
        publish_voxel_map: False
        origin_z: 0.0
        z_resolution: 0.1
        z_voxels: 10
        mark_threshold: 2
        unknown_threshold: 15
        combination_method: 1
        observation_sources: traversability
        traversability:
          topic: /traversability/obstacles
          data_type: "PointCloud2"
          sensor_frame: ""
          observation_persistence: 0.5
          expected_update_rate: 0.0
          marking: True
          clearing: True
          min_obstacle_height: 0.05
          max_obstacle_height: 2.0
          obstacle_max_range: 10.0
          obstacle_min_range: 0.3
          raytrace_max_range: 12.0
          raytrace_min_range: 0.0
      always_send_full_costmap: False
  local_costmap_client:
    ros__parameters:
      use_sim_time: False
  local_costmap_rclcpp_node:
    ros__parameters:
      use_sim_time: False

# ============ 全局代价地图配置 ============
global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 5.0  # 全局地图无需高频更新
      publish_frequency: 2.0  # 降低发布频率节省带宽
      global_frame: map  # 全局坐标系
      robot_base_frame: base_link  # 机器人底盘坐标系
      use_sim_time: False
      robot_radius: 0.25  # 机器人半径(m) = 39cm
      resolution: 0.05  # 地图分辨率(m/pixel)
      track_unknown_space: true  # 跟踪未知空间
      plugins: ["static_layer", "dynamic_scan_layer", "click_obstacles_layer", "inflation_layer", "hole_centerline_layer"]  # 使用的层插件
      dynamic_scan_layer:
        plugin: "click_obstacles_layer::DynamicScanLayer"
        enabled: True
        topic: /traversability/scan
        obstacle_radius: 0.35
        max_obstacle_age: 0.6
        transform_tolerance: 0.2
        min_range: 0.3
        max_range: 10.0
      # === 2D体素障碍物层（使用VoxelLayer减少抖动）===
      voxel2d_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: False
        publish_voxel_map: False
        origin_z: 0.0
        z_resolution: 0.1
        z_voxels: 10
        mark_threshold: 2  # 需要2次标记才算障碍，减少噪声
        unknown_threshold: 15
        # 只有启动地形分析(terrain:=true)时才有动态障碍物
        # 不启动时只使用静态地图
        observation_sources: traversability
        combination_method: 1  # 1=max, 取最大值
        # --- 地形分析障碍物源（需要启动rm_terrain_analysis）---
        traversability:
          topic: /traversability/obstacles  # 地形分析障碍物点云话题
          data_type: "PointCloud2"
          sensor_frame: ""  # 自动从消息获取
          observation_persistence: 0.5  # 障碍物持续时间(s)，减少抖动
          expected_update_rate: 0.0  # 设为0表示不检查更新频率，不启动地形分析时不报警告
          marking: True  # 用于标记障碍物
          clearing: True  # 用于射线追踪清除
          min_obstacle_height: 0.05  # 障碍物最小高度(m)
          max_obstacle_height: 2.0  # 障碍物最大高度(m)
          obstacle_max_range: 10.0  # 障碍物标记最大距离(m)
          obstacle_min_range: 0.3  # 增加最小距离过滤近距离噪声
          raytrace_max_range: 12.0
          raytrace_min_range: 0.0
      voxel3d_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: False
        publish_voxel_map: False
        origin_z: 0.0
        z_resolution: 0.05
        z_voxels: 16
        mark_threshold: 3
        observation_sources: livox
        min_obstacle_height: 0.00
        max_obstacle_height: 2.0 
        livox:
          topic: /cloud_registered
          raytrace_min_range: 0.0
          raytrace_max_range: 50.0
          min_obstacle_height: 0.0
          max_obstacle_height: 2.0 
          clearing: True
          marking: True
          data_type: "PointCloud2"
      click_obstacles_layer:
        plugin: "click_obstacles_layer::ClickObstaclesLayer"
        enabled: True
        obstacle_radius: 0.20
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      # === 膨胀层配置 ===
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 4.0  # 代价衰减因子(值越大衰减越快)
        inflation_radius: 0.8  # 膨胀半径(m) - 障碍物周围的安全距离
      hole_centerline_layer:
        plugin: "click_obstacles_layer::RegionKeepoutLayer"
        enabled: True
        polygon_frame: map
        polygon: [1.6, 1.0, 0.8, 1.0, 0.8, 3.0, 1.6, 3.0]
        centerline_width: 0.36
        keepout_cost: 254
      always_send_full_costmap: False
  global_costmap_client:
    ros__parameters:
      use_sim_time: False
  global_costmap_rclcpp_node:
    ros__parameters:
      use_sim_time: False

map_server:
  ros__parameters:
    use_sim_time: False
    yaml_filename: ""

map_saver:
  ros__parameters:
    use_sim_time: False
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: True

# ============ 路径规划器配置 ============
planner_server:
  ros__parameters:
    expected_planner_frequency: 20.0  # 期望规划频率(Hz)
    use_sim_time: False
    planner_plugins: ["GridBased"]  # 使用的规划器插件
    GridBased:
      # plugin: "nav2_navfn_planner/NavfnPlanner"  # Dijkstra/A*
      plugin: "nav2_smac_planner/SmacPlanner2D"  # State Lattice 混合A*
      # plugin: "nav2_theta_star_planner/ThetaStarPlanner"  # Theta*
      tolerance: 0.2  # 目标容差(m)
      allow_unknown: true  # 允许规划穿过未知区域
      downsample_costmap: false  # 是否下采样代价地图（大地图时可启用）
      downsampling_factor: 2  # 下采样倍率（例如5cm→10cm）
      cost_travel_multiplier: 10.0  # 代价地图行进代价乘数，越大越倾向绕开膨胀区
      use_final_approach_orientation: true  # 使用最终接近方向
      # --- 路径平滑器 ---
      smoother:
        max_iterations: 200  # 最大迭代次数
        w_smooth: 0.8  # 平滑权重 ↑ 提高使路径更直
        w_data: 0.2  # 数据权重 ↓ 降低以减少对原路径的依赖
        tolerance: 1.0e-10  # 收敛容差
        do_refinement: true  # 启用细化
        refinement_num: 1  # 细化次数

# planner_server_rclcpp_node:
#   ros__parameters:
#     use_sim_time: False

# ============ 恢复行为服务器配置 ============
recoveries_server:
  ros__parameters:
    costmap_topic: local_costmap/costmap_raw  # 局部代价地图话题
    footprint_topic: local_costmap/published_footprint  # 机器人footprint话题
    cycle_frequency: 10.0  # 循环频率(Hz)
    recovery_plugins: ["wait"]  # 启用的恢复行为插件
    spin:
      plugin: "nav2_recoveries/Spin"  # 原地旋转
    backup:
      plugin: "nav2_recoveries/BackUp"  # 后退
    wait:
      plugin: "nav2_recoveries/Wait"  # 等待
    # global_frame: camera_init
    global_frame: odom  # 全局坐标系
    robot_base_frame: base_link  # 机器人坐标系
    transform_timeout: 0.1  # TF变换超时(s)
    use_sim_time: False
    simulate_ahead_time: 2.0  # 前向仿真时间(s)
    max_rotational_vel: 20.0  # 最大旋转速度(rad/s)
    min_rotational_vel: 0.4  # 最小旋转速度(rad/s)
    rotational_acc_lim: 10.0  # 旋转加速度限制(rad/s²)

robot_state_publisher:
  ros__parameters:
    use_sim_time: False

# ============ 航点跟随器配置 ============
waypoint_follower:
  ros__parameters:
    loop_rate: 20  # 循环频率(Hz)
    stop_on_failure: false  # 失败时不停止
    waypoint_task_executor_plugin: "wait_at_waypoint"  # 航点任务执行器
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 200  # 在航点等待时间(ms)

